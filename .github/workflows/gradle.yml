
name: Java CI with Gradle

run-name: ${{ inputs.orchestrator_run_suffix && format('Java CI with Gradle - {0}', inputs.orchestrator_run_suffix) || github.workflow }}
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      enterprise_version:
        description: Specmatic Enterprise version under test
        required: false
        type: string

      enterprise_artifact_url:
        description: Specmatic Enterprise jar/artifact URL under test
        required: false
        type: string

      orchestrator_run_suffix:
        description: Test orchestrator run suffix
        required: false
        type: string

jobs:
  prepare-enterprise-artifact:
    if: ${{ inputs.enterprise_artifact_url != '' && inputs.enterprise_version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      artifact-id: ${{ steps.upload-enterprise-artifact.outputs.artifact-id }}
    steps:
      - name: Prepare Specmatic Enterprise artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.specmatic"

          echo "Downloading Enterprise artifact from:"
          echo "${{ inputs.enterprise_artifact_url }}"
          echo "Retry configuration: 5 retries with 15 second delay"

          curl --http1.1 -L --fail \
            --retry 5 \
            --retry-delay 15 \
            --retry-all-errors \
            --continue-at - \
            "${{ inputs.enterprise_artifact_url }}" \
            -o "$HOME/.specmatic/specmatic-enterprise.jar"

      - name: Upload Specmatic Enterprise artifact
        id: upload-enterprise-artifact
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-enterprise-jar
          path: ~/.specmatic/specmatic-enterprise.jar
          if-no-files-found: error
          retention-days: 1

  build:
    needs: [prepare-enterprise-artifact]
    if: ${{ always() && (needs.prepare-enterprise-artifact.result == 'success' || needs.prepare-enterprise-artifact.result == 'skipped') }}

    env:
      CTRF_REPORT_PATH: './build/reports/specmatic/async/test/ctrf/*.json'
      ENTERPRISE_VERSION: ${{ inputs.enterprise_version }}
      ENTERPRISE_ARTIFACT_URL: ${{ inputs.enterprise_artifact_url }}
      SPECMATIC_DOCKER_IMAGE: specmatic/enterprise:latest
      APP_RUNTIME_DOCKER_IMAGE: eclipse-temurin:17-jre

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        receive: [kafka, sqs, mqtt, jms, amqp]
        send: [kafka, sqs, mqtt, jms, amqp]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add orchestrator context to summary
        if: ${{ inputs.orchestrator_run_suffix != '' }}
        run: |
          echo "### Orchestrator" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: ${{ inputs.orchestrator_run_suffix }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Receive protocol: ${{ matrix.receive }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Send protocol: ${{ matrix.send }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Add matrix context to summary
        run: |
          echo "### Protocol Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "Receive protocol: ${{ matrix.receive }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Send protocol: ${{ matrix.send }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@dbbdc275be76ac10734476cc723d82dfe7ec6eda

      - name: Pull Docker images
        shell: bash
        run: |
          set -euo pipefail

          retries=3
          delay=10

          for image in "${SPECMATIC_DOCKER_IMAGE}" "${APP_RUNTIME_DOCKER_IMAGE}"; do
            for attempt in $(seq 1 "$retries"); do
              if docker pull "$image"; then
                break
              fi

              if [ "$attempt" -eq "$retries" ]; then
                echo "Failed to pull $image after ${retries} attempts"
                exit 1
              fi

              echo "Retrying docker pull for $image in ${delay}s (attempt ${attempt}/${retries})"
              sleep "$delay"
            done
          done

      - name: Download Specmatic Enterprise artifact
        if: ${{ inputs.enterprise_artifact_url != '' && inputs.enterprise_version != '' }}
        uses: actions/download-artifact@v5
        with:
          name: specmatic-enterprise-jar
          path: ~/.specmatic

      - name: Install Specmatic Enterprise artifact into local Maven
        if: ${{ inputs.enterprise_artifact_url != '' && inputs.enterprise_version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          mvn install:install-file \
            -Dfile="$HOME/.specmatic/specmatic-enterprise.jar" \
            -DgroupId=io.specmatic.enterprise \
            -DartifactId=executable \
            -Dversion="${ENTERPRISE_VERSION}" \
            -Dpackaging=jar \
            -DgeneratePom=true

          echo "Installed Enterprise artifact into local Maven"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          echo "=============================================="
          echo "Running tests: receive=${{ matrix.receive }} send=${{ matrix.send }}"
          echo "=============================================="

          ./gradlew test --tests "**.ContractTest" \
            -Dreceive.protocol=${{ matrix.receive }} \
            -Dsend.protocol=${{ matrix.send }} \
            -DspecmaticDockerImage=${SPECMATIC_DOCKER_IMAGE} \
            ${ENTERPRISE_VERSION:+-PspecmaticEnterpriseVersion=${ENTERPRISE_VERSION}} \
            ${ENTERPRISE_VERSION:+-PenterpriseVersion=${ENTERPRISE_VERSION}} \
            --no-daemon --rerun-tasks

      - name: Upload CTRF Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ctrf-report-${{ matrix.receive }}-${{ matrix.send }}
          path: ${{ env.CTRF_REPORT_PATH }}
          if-no-files-found: warn
          retention-days: 5

      - name: Publish Test Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: ${{ env.CTRF_REPORT_PATH }}

  cleanup-enterprise-artifact:
    needs: [prepare-enterprise-artifact, build]
    if: ${{ always() && needs.prepare-enterprise-artifact.result == 'success' && needs.prepare-enterprise-artifact.outputs.artifact-id != '' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete Specmatic Enterprise artifact
        uses: actions/github-script@v8
        with:
          script: |
            const artifactId = Number('${{ needs.prepare-enterprise-artifact.outputs.artifact-id }}');

            if (!artifactId) {
              core.info('No enterprise artifact id found, skipping delete.');
              return;
            }

            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifactId,
                });

                core.info(`Deleted workflow artifact ${artifactId}.`);
                return;
              } catch (error) {
                if (error.status === 404) {
                  core.info(`Artifact ${artifactId} already gone.`);
                  return;
                }

                const retryable = error.status === 429 || (error.status >= 500 && error.status < 600);

                if (attempt === 3 || !retryable) {
                  throw error;
                }

                core.info(`Delete failed on attempt ${attempt}. Retrying...`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 5000));
              }
            }
