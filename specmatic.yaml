version: 3
systemUnderTest:
  service:
    $ref: '#/components/services/orderAsyncService'
    runOptions:
      $ref: '#/components/runOptions/orderAsyncServiceTest'
    data:
      examples:
        - directories:
            - examples
components:
  sources:
    contracts:
      filesystem:
        directory: .
  services:
    orderAsyncService:
      definitions:
        - definition:
            source:
              $ref: '#/components/sources/contracts'
            specs:
              - spec/spec.yaml
  runOptions:
    orderAsyncServiceTest:
      asyncapi:
        type: test
        servers:
          - host: http://localstack-sqs:4566/000000000000
            protocol: sqs
            adminCredentials:
              region: us-east-1
              aws.access.key.id: test
              aws.secret.access.key: test
