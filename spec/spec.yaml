asyncapi: '3.0.0'
info:
  title: Order API SQS Demo
  version: '1.0.0'
servers:
  sqs:
    host: http://localstack-sqs:4566/000000000000
    protocol: sqs
channels:
  NewOrders:
    address: new-orders
    servers:
      - $ref: '#/servers/sqs'
    messages:
      placeOrder.message:
        $ref: '#/components/messages/OrderRequest'
  WorkInProgressOrders:
    address: wip-orders
    servers:
      - $ref: '#/servers/sqs'
    messages:
      orderInitiated.message:
        $ref: '#/components/messages/Order'
operations:
  placeOrder:
    action: receive
    channel:
      $ref: '#/channels/NewOrders'
    messages:
      - $ref: '#/channels/NewOrders/messages/placeOrder.message'
    reply:
      channel:
        $ref: '#/channels/WorkInProgressOrders'
      messages:
        - $ref: '#/channels/WorkInProgressOrders/messages/orderInitiated.message'
components:
  messages:
    OrderRequest:
      name: OrderRequest
      contentType: application/json
      headers:
        type: object
        properties:
          orderCorrelationId:
            type: string
        additionalProperties: true
      payload:
        type: object
        required:
          - id
          - orderItems
        properties:
          id:
            type: integer
          orderItems:
            type: array
            items:
              type: object
              required:
                - id
                - name
                - quantity
                - price
              properties:
                id:
                  type: integer
                name:
                  type: string
                quantity:
                  type: integer
                price:
                  type: number
    Order:
      name: Order
      contentType: application/json
      headers:
        type: object
        properties:
          orderCorrelationId:
            type: string
        additionalProperties: true
      payload:
        type: object
        required:
          - id
          - totalAmount
          - status
        properties:
          id:
            type: integer
          totalAmount:
            type: number
          status:
            type: string
            enum:
              - INITIATED
